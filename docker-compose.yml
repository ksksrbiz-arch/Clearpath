services:
  web:
    build: .
    container_name: clearpath-web
    ports:
      - "3000:80"
    restart: unless-stopped

  dev:
    image: node:22-alpine
    container_name: clearpath-dev
    working_dir: /app
    volumes:
      - .:/app
      - node_modules:/app/node_modules
    ports:
      - "5173:5173"
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    profiles:
      - dev

volumes:
  node_modules:
