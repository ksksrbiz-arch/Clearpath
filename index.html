<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#1a3a2a" />
    <title>ClearPath Environmental — Restoring Oregon's Public Lands</title>
    <meta name="description" content="Community-rooted environmental services for Oregon City, Clackamas County, and the greater Portland metro." />
    <meta property="og:title" content="ClearPath Environmental — Business Plan" />
    <meta property="og:description" content="Restoring Oregon's roadsides, parks, and public lands." />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="/og-image.svg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://clearpath-environmental.netlify.app/" />
    <link rel="canonical" href="https://clearpath-environmental.netlify.app/" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Source+Sans+3:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
    <!-- Plausible Analytics — privacy-friendly, cookie-free -->
    <script defer data-domain="clearpath-environmental.netlify.app" src="https://plausible.io/js/script.js"></script>
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "ClearPath Environmental",
      "description": "Community-rooted environmental services for Oregon City, Clackamas County, and the greater Portland metro.",
      "areaServed": [
        {
          "@type": "City",
          "name": "Oregon City",
          "containedInPlace": { "@type": "State", "name": "Oregon" }
        },
        {
          "@type": "AdministrativeArea",
          "name": "Clackamas County, Oregon"
        },
        {
          "@type": "AdministrativeArea",
          "name": "Portland Metro, Oregon"
        }
      ],
      "address": {
        "@type": "PostalAddress",
        "addressLocality": "Oregon City",
        "addressRegion": "OR",
        "addressCountry": "US"
      },
      "url": "https://clearpath-environmental.netlify.app/",
      "email": "skdevv@att.net",
      "hasOfferCatalog": {
        "@type": "OfferCatalog",
        "name": "Environmental Cleanup Services",
        "itemListElement": [
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Roadside & Highway Cleanup",
              "description": "Professional litter removal and maintenance for highways, roadsides, and public right-of-ways."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Park & Public Land Restoration",
              "description": "Cleanup and restoration of parks, trails, and wooded public lands."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Illegal Dump Site Remediation",
              "description": "Assessment, cleanup, and documentation of illegal dumping sites on public and private land."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Private Property Cleanup",
              "description": "Commercial lot, perimeter, and right-of-way cleanup for property managers, HOAs, and business districts."
            }
          },
          {
            "@type": "Offer",
            "itemOffered": {
              "@type": "Service",
              "name": "Material Recovery & Recycling",
              "description": "Sorting and redemption of recyclable materials including Oregon Bottle Bill containers and scrap metal."
            }
          }
        ]
      }
    }
    </script>
  </head>
  <body>
    <!-- Hidden form for Netlify Forms build detection (React renders the real form client-side) -->
    <form name="contact" netlify netlify-honeypot="bot-field" hidden>
      <input type="text" name="name" />
      <input type="email" name="email" />
      <select name="interest"><option value=""></option></select>
      <textarea name="message"></textarea>
    </form>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
